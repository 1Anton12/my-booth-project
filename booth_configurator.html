<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Booth Configurator Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "tween.js": "https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18.6.4/dist/tween.esm.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            color: #fff;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-btn.new {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }

        .modal-btn.load {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border: none;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .file-input {
            display: none;
        }

        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
            min-height: 0;
            overflow: hidden;
        }

        .lang-bar {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            display: flex;
            gap: 5px;
            background: rgba(15, 15, 30, 0.9);
            backdrop-filter: blur(12px);
            padding: 4px 10px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px; /* Чуть меньше шрифт */
            transition: 0.2s;
            opacity: 0.6;
        }

        .lang-btn.active {
            background: rgba(102, 126, 234, 0.8);
            opacity: 1;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }

        .sidebar-header > div {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .lang-switcher {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-end;
        }

        .sidebar-header h1 {
            min-width: 0;
            flex: 1;
        }


        .sidebar {
            width: 350px;
            height: 100vh;
            max-height: 100vh;
            min-height: 0;
            background: rgba(15, 15, 30, 0.95);
            backdrop-filter: blur(22px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 15px;
            z-index: 10;
            transition: width 0.3s ease;
            position: relative;
            overscroll-behavior: contain;
            touch-action: pan-y;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.35) transparent;
        }

        .sidebar::before,
        .sidebar::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 30px;
            pointer-events: none;
            z-index: 1;
        }

        .sidebar::before {
            top: 0;
            background: linear-gradient(180deg, rgba(15,15,30,0.95), rgba(15,15,30,0));
        }

        .sidebar::after {
            bottom: 0;
            background: linear-gradient(0deg, rgba(15,15,30,0.95), rgba(15,15,30,0));
        }

        .sidebar::-webkit-scrollbar {
            width: 10px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.28);
            border-radius: 999px;
            border: 2px solid rgba(15,15,30,0.5);
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.4);
        }

        /* Адаптивность для Telegram Mini App и мобильных */
        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 40%;
                order: 2;
                border-right: none;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }
            .canvas-container {
                height: 60%;
                order: 1;
            }
            .sidebar-header h1 {
                font-size: 20px;
            }
        }

        .sidebar-header {
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b0b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sidebar-header p {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 6px;
        }

        .category {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.2s;
        }

        .category-header {
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 15px;
        }

        .category-content {
            padding: 0 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }

        .category.active .category-content {
            max-height: 600px;
            padding: 16px;
        }

        .option-group {
            margin-bottom: 18px;
        }

        .option-label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            color: #aaa;
            display: block;
            margin-bottom: 8px;
        }

        .option-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .option-item {
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.1s;
            color: #eee;
        }

        .option-item.selected {
            background: #667eea;
            border-color: #667eea;
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .color-picker {
            width: 100%;
            height: 38px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
        }

        .counter-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 6px;
        }

        .counter-btn {
            background: #2c3e66;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
        }

        .counter-btn:hover {
            background: #1e2a47;
        }

        .counter-value {
            font-size: 18px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .price-section {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-radius: 24px;
            padding: 18px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
        }

        .price-value {
            font-size: 32px;
            font-weight: 700;
            margin: 8px 0;
        }

        .price-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #0a0e27, #1a1a3e);
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .selected-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(12px);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            min-width: 200px;
            z-index: 50;
        }

        .selected-panel.active {
            display: block;
        }

        .selected-panel h3 {
            margin-bottom: 12px;
            font-size: 14px;
            color: #ffaa44;
        }

        .selected-panel .option-group {
            margin-bottom: 12px;
        }

        .slider-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .slider-control input[type="range"] {
            flex: 1;
            cursor: pointer;
        }

        .slider-control span {
            font-size: 12px;
            min-width: 40px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; max-height: 48%; }
            .app { flex-direction: column; }
            .canvas-container { height: 52%; }
        }
    </style>
</head>
<body>

<div id="modeModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">✨ Booth Configurator</h2>
        <div class="modal-buttons">
            <button class="modal-btn new" id="newModeBtn">➕ Create new</button>
            <button class="modal-btn load" id="loadModeBtn">📂 Load config</button>
        </div>
        <input type="file" id="configFileInput" accept=".json" style="display:none">
    </div>
</div>

<div class="app">
    <div class="sidebar">
    <div class="sidebar-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 id="title" style="margin: 0;">🎨 Конфигуратор стенда</h1>
                <p id="subtitle" style="margin: 4px 0 0;">Drag objects with LMB</p>
            </div>
            <div class="lang-switcher">
                <button class="lang-btn" data-lang="ru">RU</button>
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="lv">LV</button>
            </div>
        </div>
    </div>

        <div class="category active">
            <div class="category-header"><span id="dimLabel">📐 Размеры</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="lenLabel" class="option-label">Длина (м)</label>
                    <div class="option-items" id="lengthOpts">
                        <button class="option-item" data-length="2">2</button><button class="option-item" data-length="3">3</button>
                        <button class="option-item selected" data-length="4">4</button><button class="option-item" data-length="5">5</button>
                        <button class="option-item" data-length="6">6</button><button class="option-item" data-length="8">8</button>
                    </div>
                </div>
                <div class="option-group"><label id="widLabel" class="option-label">Ширина (м)</label>
                    <div class="option-items" id="widthOpts">
                        <button class="option-item" data-width="2">2</button><button class="option-item selected" data-width="3">3</button>
                        <button class="option-item" data-width="4">4</button><button class="option-item" data-width="5">5</button>
                        <button class="option-item" data-width="6">6</button>
                    </div>
                </div>
                <div class="option-group"><label id="heiLabel" class="option-label">Высота (м)</label>
                    <div class="option-items" id="heightOpts">
                        <button class="option-item" data-height="2">2</button><button class="option-item selected" data-height="2.5">2.5</button>
                        <button class="option-item" data-height="3">3</button><button class="option-item" data-height="3.5">3.5</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="wallsLabel">🧱 Стены</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="wallsCountLabel" class="option-label">Количество стен</label>
                    <div class="option-items" id="wallsCountOpts">
                        <button class="option-item" data-walls="1">1 стена</button>
                        <button class="option-item" data-walls="2">2 стены</button>
                        <button class="option-item selected" data-walls="3">3 стены</button>
                    </div>
                </div>
                <div class="option-group"><label id="wallColorLabel" class="option-label">Wall Color</label><input type="color" id="wallColorPicker" class="color-picker" value="#ffffff"></div>
                <div class="option-group"><label id="wallMatLabel" class="option-label">Material</label>
                    <div class="option-items" id="wallMatOpts">
                        <button class="option-item selected" data-wallmat="plastic">Plastic</button>
                        <button class="option-item" data-wallmat="wood">Wood</button>
                        <button class="option-item" data-wallmat="metal">Metal</button>
                        <button class="option-item" data-wallmat="fabric">Fabric</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="floorLabel">🏢 Пол</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="floorColorLabel" class="option-label">Floor Color</label><input type="color" id="floorColorPicker" class="color-picker" value="#cccccc"></div>
                <div class="option-group"><label id="floorTypeLabel" class="option-label">Floor Type</label>
                    <div class="option-items" id="floorTypeOpts">
                        <button class="option-item selected" data-floortype="carpet">Carpet</button>
                        <button class="option-item" data-floortype="tile">Tile</button>
                        <button class="option-item" data-floortype="wood">Parquet</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="furnLabel">🪑 Мебель</span><span>▼</span></div>
            <div class="category-content" id="furnitureUI"></div>
        </div>

        <div class="category">
            <div class="category-header"><span id="lightLabel">💡 Освещение</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="lightTypeLabel" class="option-label">Тип света</label>
                    <div class="option-items" id="lightTypeOpts">
                        <button class="option-item selected" data-lighttype="warm">Warm</button>
                        <button class="option-item" data-lighttype="cool">Cool</button>
                        <button class="option-item" data-lighttype="neutral">Neutral</button>
                    </div>
                </div>
                <div class="option-group"><label id="lampCountLabel" class="option-label">Количество ламп</label>
                    <div class="counter-control"><button class="counter-btn" id="lampMinus">-</button><span class="counter-value" id="lampCountVal">2</span><button class="counter-btn" id="lampPlus">+</button></div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="equipLabel">📺 Оборудование</span><span>▼</span></div>
            <div class="category-content" id="equipmentUI"></div>
        </div>

        <div class="price-section">
            <div class="price-label" id="totalLabel">Total Price</div>
            <div class="price-value" id="totalPrice">0 €</div>
            <div class="action-buttons">
                <button class="btn btn-primary" id="saveBtn">💾 Save</button>
                <button class="btn btn-secondary" id="resetBtn">🔄 Reset</button>
                <button class="btn btn-secondary" id="loadConfigBtn">📂 Load JSON</button>
            </div>
        </div>
    </div>
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="debug-info" style="position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px; font-size: 12px;">Loading...</div>
        <div class="selected-panel" id="selectedPanel">
            <h3 id="selectedName">Selected object</h3>
            <div class="option-group">
                <label id="rotationLabel" class="option-label">Rotation</label>
                <div class="slider-control">
                    <input type="range" id="rotationSlider" min="0" max="360" value="0">
                    <span id="rotationValue">0°</span>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-secondary" id="deleteObjBtn">🗑️ Delete</button>
            </div>
        </div>
        <div class="info-panel" id="infoText">
            🖱️ LMB on object → drag | LMB on background → rotate | RMB → pan | R → rotate
        </div>
    </div>
</div>

    // Текстуры
    function createWoodTexture() {
        const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#deb887'; ctx.fillRect(0,0,512,512);
        for(let i=0;i<200;i++){ ctx.beginPath(); ctx.moveTo(i*20,0); ctx.lineTo(i*20+10,512); ctx.lineTo(i*20-10,512); ctx.fillStyle='#8b4513'; ctx.fill(); }
        const tex = new THREE.CanvasTexture(canvas); tex.wrapS=THREE.RepeatWrapping; tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(2,2);
        return tex;
    }
    function createTileTexture() {
        const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,512,512);
        ctx.strokeStyle='#333333'; ctx.lineWidth=8;
        for(let i=0;i<8;i++){ ctx.beginPath(); ctx.moveTo(i*64,0); ctx.lineTo(i*64,512); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*64); ctx.lineTo(512,i*64); ctx.stroke(); }
        const tex = new THREE.CanvasTexture(canvas); tex.wrapS=THREE.RepeatWrapping; tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(4,4);
        return tex;
    }
    function createParquetTexture() {
        const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle='#deb887'; ctx.fillRect(0,0,512,512);
        for(let i=0;i<20;i++){ ctx.fillStyle='#654321'; ctx.fillRect(i*50,0,20,512); }
        const tex = new THREE.CanvasTexture(canvas); tex.wrapS=THREE.RepeatWrapping; tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(4,4);
        return tex;
    }

    function syncLampItems() {
        const lampItems = config.items.filter(item => item.type === 'lamp');
        const current = lampItems.length;
        const desired = config.lampCount;
        const limitX = Math.max(0.5, (config.dims.length / 2) - 0.7);
        const limitZ = Math.max(0.5, (config.dims.width / 2) - 0.7);

        if(desired > current) {
            for(let i=current; i<desired; i++) {
                const item = {
                    id: nextId++,
                    type: 'lamp',
                    category: 'lighting',
                    posX: (Math.random() * 2 - 1) * limitX,
                    posZ: (Math.random() * 2 - 1) * limitZ
                };
                config.items.push(item);
            }
        } else if(desired < current) {
            const toRemove = lampItems.slice(desired);
            config.items = config.items.filter(item => !toRemove.some(rem => rem.id === item.id));
        }
    }

    function rebuildScene() {
        while(boothGroup.children.length) boothGroup.remove(boothGroup.children[0]);
        itemMap.clear();
        originalColors.clear();
        const { length, width, height } = config.dims;
        
        // Пол
        const floorMat = getFloorMaterial();
        const floorPlane = new THREE.Mesh(new THREE.PlaneGeometry(length, width), floorMat);
        floorPlane.rotation.x = -Math.PI/2; floorPlane.receiveShadow = true; floorPlane.castShadow = true;
        boothGroup.add(floorPlane);
        
        // Стены
        const wallMat = getWallMaterial();
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(length, height, 0.1), wallMat);
        backWall.position.set(0, height/2, -width/2); backWall.castShadow=true; backWall.receiveShadow=true;
        boothGroup.add(backWall);
        if(config.wallsCount >= 2){
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, width), wallMat);
            leftWall.position.set(-length/2, height/2, 0); leftWall.castShadow=true; leftWall.receiveShadow=true;
            boothGroup.add(leftWall);
        }
        if(config.wallsCount >= 3){
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, width), wallMat);
            rightWall.position.set(length/2, height/2, 0); rightWall.castShadow=true; rightWall.receiveShadow=true;
            boothGroup.add(rightWall);
        }
        
        // Потолочные фермы и балки (интерьер павильона)
        const beamMat = new THREE.MeshStandardMaterial({ color:0x555555, roughness:0.7 });
        for(let i=0; i<4; i++){
            const beam = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, length+2), beamMat);
            beam.position.set((i-1.5)*2, height+0.5, 0);
            beam.castShadow=true;
            boothGroup.add(beam);
        }
        
        syncLampItems();

        // Объекты
        config.items.forEach(item => {
            const obj = create3DObject(item.type, item.id, item.posX, item.posZ);
            if(obj) {
                const rot = objectRotations.get(item.id) || 0;
                obj.rotation.y = rot;
                obj.scale.set(0,0,0);
                boothGroup.add(obj);
                itemMap.set(item.id, obj);
                new TWEEN.Tween(obj.scale).to({x:1,y:1,z:1}, 500).easing(TWEEN.Easing.Quadratic.Out).start();
            }
        });
        
        // Лампы
        lamps.forEach(l => scene.remove(l)); lamps = [];
        const lampColor = config.lightType==='warm'?0xffaa66:(config.lightType==='cool'?0x88aaff:0xffffff);
        const lampIntensity = 0.8;
        const ceilingY = Math.max(1.8, config.dims.height - 0.25);
        config.items.filter(item => item.type === 'lamp').forEach(item => {
            const lamp = new THREE.PointLight(lampColor, lampIntensity, 15);
            lamp.castShadow = true;
            lamp.shadow.mapSize.width = 512;
            lamp.shadow.mapSize.height = 512;
            lamp.position.set(item.posX, ceilingY - 0.1, item.posZ);
            scene.add(lamp);
            lamps.push(lamp);
        });
        updatePrice();
    }

    function updatePrice(){
        const { length, width, height } = config.dims;
        const area = length*width;
        let total = prices.baseSqm * area;
        total += prices.wallMat[config.wallMaterial] * (2*(length+width)*height);
        total += prices.floor[config.floorType] * area;
        for(let [k,v] of Object.entries(config.furniture)) total += v * prices.furniture[k];
        for(let [k,v] of Object.entries(config.equipment)) total += v * prices.equipment[k];
        total += config.lampCount * prices.lamp;
        document.getElementById('totalPrice').innerHTML = `${Math.round(total).toLocaleString()} €`;
    }

    function getMousePlaneIntersect(event, plane, outVec){
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2();
        mouse.x = ((event.clientX - rect.left)/rect.width)*2 - 1;
        mouse.y = -((event.clientY - rect.top)/rect.height)*2 + 1;
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        if(raycaster.ray.intersectPlane(plane, outVec)) return true;
        return false;
    }

    function highlightObject(obj, highlight){
        // Подсветка объекта отключена, чтобы цвет оставался естественным.
        return;
    }

    function setSelectedObject(obj) {
        if(selectedObj && selectedObj !== obj) {
            highlightObject(selectedObj, false);
        }
        selectedObj = obj;
        selectedId = obj ? obj.userData.itemId : null;
        if(selectedObj) {
            highlightObject(selectedObj, true);
            document.getElementById('selectedPanel').classList.add('active');
            document.getElementById('selectedName').innerText = `${translations[currentLang].selectedPrefix}: ${translations[currentLang][selectedObj.userData.type] || selectedObj.userData.type}`;
            const rot = objectRotations.get(selectedId) || 0;
            document.getElementById('rotationSlider').value = rot;
            document.getElementById('rotationValue').innerText = rot + '°';
        } else {
            document.getElementById('selectedPanel').classList.remove('active');
        }
    }


    function rotateObject(obj, angle) {
        if(obj) obj.rotation.y = angle * Math.PI / 180;
    }

    function onMouseDownObj(e){
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2();
        mouse.x = ((e.clientX - rect.left)/rect.width)*2 - 1;
        mouse.y = -((e.clientY - rect.top)/rect.height)*2 + 1;
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(Array.from(itemMap.values()), true);
        if(intersects.length){
            let hit = intersects[0].object;
            selectedObj = null;
            while(hit){
                if(hit.userData && hit.userData.itemId){
                    selectedObj = hit;
                    break;
                }
                if(hit === boothGroup) break;
                hit = hit.parent;
            }
            if(selectedObj && selectedObj.userData.itemId){
                selectedId = selectedObj.userData.itemId;
                const yLev = selectedObj.position.y;
                dragPlane.set(new THREE.Vector3(0,1,0), yLev);
                const p = new THREE.Vector3();
                if(getMousePlaneIntersect(e, dragPlane, p)) dragOffsetVec.copy(selectedObj.position).sub(p);
                dragActive = true;
                dragBtn = 1;
                lastMousePos = {x:e.clientX, y:e.clientY};
                setSelectedObject(selectedObj);
                
                e.preventDefault();
                e.stopPropagation();
                return true;
            }
        }
        return false;
    }

    function onMouseMoveObj(e){
        if(selectedObj && dragBtn===1 && selectedId){
            const p = new THREE.Vector3();
            if(getMousePlaneIntersect(e, dragPlane, p)){
                let newPos = p.clone().add(dragOffsetVec);
                const limitX = (config.dims.length/2)-0.7;
                const limitZ = (config.dims.width/2)-0.7;
                newPos.x = Math.max(-limitX, Math.min(limitX, newPos.x));
                newPos.z = Math.max(-limitZ, Math.min(limitZ, newPos.z));
                selectedObj.position.copy(newPos);
                const item = config.items.find(i=>i.id===selectedId);
                if(item){ item.posX = newPos.x; item.posZ = newPos.z; }
            }
            lastMousePos = {x:e.clientX, y:e.clientY};
            e.preventDefault();
            return;
        }
    }

    function onMouseUpObj(){ 
        dragActive=false; dragBtn=0; 
    }

        renderer.domElement.addEventListener('mousedown', (e) => {
            if(e.button === 0) { if(!onMouseDownObj(e)) { dragActive=true; dragBtn=0; } }
            else if(e.button === 2) { dragActive=true; dragBtn=2; }
            lastMousePos = {x:e.clientX, y:e.clientY};
        });
        renderer.domElement.addEventListener('mousemove', (e) => {
            onMouseMoveObj(e);
            if(dragActive && dragBtn!==1){
                const dx = e.clientX - lastMousePos.x, dy = e.clientY - lastMousePos.y;
                if(dragBtn===0) { orbitX -= dx*0.005; orbitY -= dy*0.005; }
                else if(dragBtn===2) { panX -= dx*0.01; panY += dy*0.01; }
                lastMousePos = {x:e.clientX, y:e.clientY};
            }
        });
        renderer.domElement.addEventListener('mouseup', () => { onMouseUpObj(); dragActive=false; dragBtn=0; });
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        renderer.domElement.addEventListener('wheel', (e) => { radius += e.deltaY*0.01; radius = Math.max(2, Math.min(20, radius)); e.preventDefault(); });

            if(e.key === 'r' || e.key === 'R') {

                boothGroup.remove(selectedObj);
                selectedObj = null;
                selectedId = null;
                document.getElementById('selectedPanel').classList.remove('active');
                rebuildScene();
            }
        });
        
        function animate() {
            requestAnimationFrame(animate);
            const orbitRad = Math.max(0.1, Math.min(Math.PI-0.1, orbitY));
            camera.position.x = center.x + radius * Math.sin(orbitRad) * Math.cos(orbitX);
            camera.position.y = center.y + radius * Math.cos(orbitRad);
            camera.position.z = center.z + radius * Math.sin(orbitRad) * Math.sin(orbitX);
            camera.position.add(new THREE.Vector3(panX, panY, 0));
            camera.lookAt(center);
            TWEEN.update();
            renderer.render(scene, camera);
        }
        animate();
    }

    function addOrRemoveFurniture(type, oldCount, newCount) {
        if(newCount > oldCount) {
            for(let i=0; i<newCount-oldCount; i++) {
                const item = { id: nextId++, type: type, category: 'furniture', posX: (Math.random()-0.5)*2, posZ: (Math.random()-0.5)*2 };
                config.items.push(item);
                const obj = create3DObject(type, item.id, item.posX, item.posZ);
                if(obj) { boothGroup.add(obj); itemMap.set(item.id, obj); }
            }
        } else {
            for(let i=0; i<oldCount-newCount; i++) {
                const item = config.items.find(it => it.type === type && it.category === 'furniture');
                if(item) {
                    config.items = config.items.filter(it => it.id !== item.id);
                    const obj = itemMap.get(item.id);
                    if(obj) boothGroup.remove(obj);
                    itemMap.delete(item.id);
                    objectRotations.delete(item.id);
                }
            }
        }
    }

    function addOrRemoveEquipment(type, oldCount, newCount) {
        if(newCount > oldCount) {
            for(let i=0; i<newCount-oldCount; i++) {
                const item = { id: nextId++, type: type, category: 'equipment', posX: (Math.random()-0.5)*2, posZ: (Math.random()-0.5)*2 };
                config.items.push(item);
                const obj = create3DObject(type, item.id, item.posX, item.posZ);
                if(obj) { boothGroup.add(obj); itemMap.set(item.id, obj); }
            }
        } else {
            for(let i=0; i<oldCount-newCount; i++) {
                const item = config.items.find(it => it.type === type && it.category === 'equipment');
                if(item) {
                    config.items = config.items.filter(it => it.id !== item.id);
                    const obj = itemMap.get(item.id);
                    if(obj) boothGroup.remove(obj);
                    itemMap.delete(item.id);
                    objectRotations.delete(item.id);
                }
            }
        }
    }

        // Скрываем модальное окно выбора режима, так как в Mini App мы сразу в режиме конфигурации
        document.getElementById('modeModal').style.display = 'none';
        
        // Handle theme colors
        document.body.style.backgroundColor = tg.themeParams.bg_color || '#0f0c29';
        
        // Close app button
        tg.MainButton.setText('Confirm Configuration').show().onClick(() => {
            // Send configuration back to bot if needed
            tg.sendData(JSON.stringify({
                action: 'confirm',
                config: config
            }));
            tg.close();
        });
    }
	</script>

</body>
</html>
